version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: walletuser
      POSTGRES_PASSWORD: walletpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  wallet:
    build: .
    image: wallet:latest
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: walletdb
      DB_USER: walletuser
      DB_PASSWORD: walletpass
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:


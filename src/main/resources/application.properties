spring.application.name=wallet

# Datasource configuration - values are read from environment variables with sensible defaults
# In docker-compose we set: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:walletdb}
spring.datasource.username=${DB_USER:walletuser}
spring.datasource.password=${DB_PASSWORD:walletpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (development-friendly defaults)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Show SQL in logs when running locally (set to false in production)
spring.jpa.show-sql=true

